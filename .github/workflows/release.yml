name: Release

# Publishes the package to npm (both @trysentinel/qa and @run-agents/qa) when
# you publish a GitHub Release.
# Gated: it re-runs typecheck + unit tests + a clean build (via prepublishOnly)
# before publishing, so a broken build can never reach npm.
#
# Auth: uses npm "trusted publishing" via OIDC (no token needed) once you've
# linked this repo+workflow on npmjs.com. If you prefer a token instead, add an
# NPM_TOKEN secret and it'll be used as a fallback.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      # Skip the package's Chromium postinstall; the suite needs OS deps too, so
      # install the browser explicitly below.
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # test:ci drives a real Chromium — install it (binary + OS libs) first.
      - run: npx playwright install --with-deps chromium

      # Fail fast before publishing (prepublishOnly also runs these).
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run build

      # Verify package.json version matches the release tag (e.g. tag v0.2.0 → 0.2.0).
      - name: Check version matches tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json ($PKG) != release tag ($TAG). Bump the version to match the tag."
            exit 1
          fi

      # Publish the same build to every scope (@trysentinel/qa, @run-agents/qa).
      # The gate already ran above; the script builds clean + publishes both with
      # provenance, and is idempotent (skips a scope already at this version).
      - name: Publish to all scopes
        run: node scripts/publish-all.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # ignored when OIDC trusted publishing is configured
